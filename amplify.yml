version: 1
frontend:
  phases:
    preBuild:
      commands:
        # packageManager フィールド (pnpm@11.7.0) に従って pnpm を有効化。
        # corepack が無い環境では npm 経由でフォールバック。
        - corepack enable || npm install -g pnpm@11.7.0
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
